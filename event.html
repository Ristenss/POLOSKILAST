<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ПОЛОSКИ</title>
  <link rel="stylesheet" href="stylesheets/styles.css">
</head>
<body class="eventpage">
  <header class="header">
    <nav class="nav">
      <a href="about.html">О НАС</a>
      <a href="masters.html">КОМАНДА</a>
      <a href="index.html" class="header-logo">
        <img src="images/logominebl.svg" alt="">
      </a>
      <a href="event.html" class="active">СОБЫТИЯ</a>
      <a href="uslugi.html">УСЛУГИ</a>
    </nav>
  </header>
  <main class="events">
    <h1 class="events-title">СОБЫТИЯ</h1>
    <section class="event-item">
      <img src="images/event1.png" class="event-img event-open" data-event="0" alt="">
      <div class="event-info">
        <h2 class="event-open" data-event="0">ВОРКШОПЫ ОТ&nbsp;ПРИЕЗЖИХ<br>МАСТЕРОВ</h2>
        <p>30.06.2026<br>13:00</p>
      </div>
      <button class="event-btn" type="button">ЗАПИСАТЬСЯ</button>
    </section>
    <section class="event-item">
      <img src="images/event2.png" class="event-img event-open" data-event="1" alt="">
      <div class="event-info">
        <h2 class="event-open" data-event="0">ИСТОРИЧЕСКАЯ ЛЕКЦИЯ ДЛЯ&nbsp;ТИГРЯТ</h2>
        <p>26.06.2026<br>9:00</p>
      </div>
      <button class="event-btn" type="button">ЗАПИСАТЬСЯ</button>
    </section>
    <section class="event-item">
      <img src="images/event3.png" class="event-img event-open" data-event="2" alt="">
      <div class="event-info">
        <h2 class="event-open" data-event="0">МАСТЕР-КЛАСС С&nbsp;РЕЗИДЕНТАМИ<br>СТУДИИ</h2>
        <p>21.06.2026<br>12:00</p>
      </div>
      <button class="event-btn" type="button">ЗАПИСАТЬСЯ</button>
    </section>
  </main>
  <div class="popup-overlay">
    <div class="event-popup">
      <button class="popup-close" type="button">
        <img src="images/xpopup.svg" alt="">
      </button>
      <h2>ЗАПИСЬ НА EVENT</h2>
      <p class="popup-subtitle">ЗАПОЛНИТЕ ВСЕ ПОЛЯ</p>
      <form class="popup-form">
        <input type="text" placeholder="ФИО">
        <input type="tel" placeholder="НОМЕР ТЕЛЕФОНА">
        <input type="email" placeholder="ПОЧТА">
        <label class="popup-checkbox">
          <input type="checkbox">
          <span class="checkbox-box"></span>
          <span>СОГЛАСИЕ С ПОЛИТИКОЙ СБОРА ДАННЫХ</span>
        </label>
        <button class="popup-submit" type="submit">ОТПРАВИТЬ</button>
      </form>
    </div>
  </div>
  <div class="info-popup-overlay">
  <div class="info-popup">
    <button class="info-popup-close" type="button">
      <img src="images/xform.svg" alt="">
    </button>
    <h2 class="info-popup-title"></h2>
    <div class="info-popup-content">
      <img src="" class="info-popup-img" alt="">
      <p class="info-popup-text"></p>
    </div>
    <button class="info-popup-btn" type="button">ЗАПИСАТЬСЯ</button>
  </div>
</div>
  <footer class="podval">
    <div>POLOSKI@MEOW.RU</div>
    <a href="https://hsedesign.ru/account/Chris">
      <img src="images/logohsebl.svg" class="footer-logo" alt="">
    </a>
    <div>8 800 555 35 35</div>
  </footer>
  <script src="main.js"></script>
</body>
</html>
